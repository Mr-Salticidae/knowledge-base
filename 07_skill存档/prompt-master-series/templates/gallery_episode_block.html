<!-- 画廊新增一期:复制进 index.html 的 <section class="episodes"> 内,改占位 -->
<!-- 占位:{{NN}}期号(01/02) · {{N}}第几期 · {{主题}} · {{副标题}} · {{小红书链接}} · {{完整prompt}} -->
<!-- 注意:每期的 prompt <pre> id、复制按钮 data-target、点赞 data-key 都要带 {{NN}} 以保持唯一 -->
<!-- 依赖:index.html 末尾的公共 灯箱 / 笔记弹窗 / toast / <script>(全站一份,勿重复) -->
<article class="ep" id="ep{{NN}}" data-folder="{{NN}}_{{主题}}">
  <div class="ep-head">
    <span class="ep-no">第 {{N}} 期</span>
    <span class="ep-title">《{{主题}}》</span>
  </div>
  <p class="ep-sub">{{副标题}}</p>

  <div class="gallery">
    <figure><img src="{{NN}}_{{主题}}/{{主题}}_封面卡.png" alt="《{{主题}}》封面" loading="lazy"><figcaption>封面</figcaption></figure>
    <figure><img src="{{NN}}_{{主题}}/{{主题}}_prompt拆解卡.png" alt="《{{主题}}》prompt 四层拆解" loading="lazy"><figcaption>prompt 四层拆解</figcaption></figure>
  </div>

  <figure class="original">
    <img src="{{NN}}_{{主题}}/{{主题}}_原图.png" alt="《{{主题}}》原图" loading="lazy">
    <figcaption>原图 · 点击放大,或 <a href="{{NN}}_{{主题}}/{{主题}}_原图.png" download="{{主题}}_原图.png">下载原图</a></figcaption>
  </figure>

  <div class="actions">
    <button class="btn primary copy-btn" data-target="prompt{{NN}}"><span class="ic">⧉</span>一键复制 Prompt</button>
    <button class="btn note-btn" data-folder="{{NN}}_{{主题}}" data-file="{{主题}}_笔记.md" data-title="第 {{N}} 期《{{主题}}》· 小白笔记"><span class="ic">▤</span>小白笔记</button>
    <a class="btn" href="{{小红书链接}}" target="_blank" rel="noopener"><span class="ic">↗</span>小红书原帖</a>
    <span class="spacer"></span>
    <button class="like" data-key="like_ep{{NN}}" aria-label="点赞">
      <svg viewBox="0 0 24 24"><path d="M12 20.5C5.5 16 3 12.5 3 9.2 3 6.6 5 4.7 7.4 4.7c1.6 0 3 .8 3.8 2.1.2.3.6.3.8 0 .8-1.3 2.2-2.1 3.8-2.1C21 4.7 23 6.6 23 9.2c0 3.3-2.5 6.8-9 11.3-.6.4-1.4.4-2 0z" transform="translate(-1,0)"/></svg>
      <span class="like-txt">喜欢</span>
    </button>
  </div>

  <pre id="prompt{{NN}}" hidden>{{完整prompt}}</pre>
</article>
